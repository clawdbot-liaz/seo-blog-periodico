name: Deploy to Vercel

on:
  workflow_dispatch:  # Permite ejecución manual
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: ⎔ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔨 Build project
      run: npm run build
      
    - name: 🚀 Trigger Vercel Deploy
      run: |
        # Usar el deploy hook de Vercel
        curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_IXhSQF9BB7Nfm0zevGdX6cDJmCaW/fNdTJGMHbZ" \
          -H "Content-Type: application/json" \
          -d '{"ref":"main"}'
        
    - name: ✅ Deploy triggered
      run: |
        echo "✅ Deploy triggered successfully"
        echo "Check status at: https://vercel.com/IntelligentWorldd/seo-blog-optimizado-"
        echo "Site will be available at: https://seo-blog-optimizado.vercel.app"